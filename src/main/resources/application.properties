# ============================================================
# SBI EMS — Application Configuration
# DevSecOps Training | State Bank of India
#
# SECURITY NOTICE (Module 4 — Secrets Management):
#   Sensitive values MUST come from environment variables.
#   Never hardcode passwords, secrets, or keys in this file.
#   See .env.example for required environment variables.
# ============================================================

# --- Profile ---
spring.profiles.active=dev

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Application Info ---
info.app.name=SBI EMS API
info.app.version=1.0.0
info.app.description=Employee Management System — DevSecOps Training

# --- Database (H2 in-memory for training) ---
spring.datasource.url=${DB_URL:jdbc:h2:mem:emsdb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- JWT ---
# DevSecOps Lab 1 Fix Target (A07):
# The line below uses ${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION} as the fallback.
# JwtUtil also has a hardcoded constant — both need to be fixed in Lab 1.
# After the fix: set JWT_SECRET as an environment variable, not here.
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}

# --- In-memory users (training only) ---
# DevSecOps note: credentials come from env vars, NOT hardcoded.
app.security.admin.username=${ADMIN_USERNAME:hr.admin}
app.security.admin.password=${ADMIN_PASSWORD:Admin@SBI123}
app.security.user.username=${USER_USERNAME:emp.user}
app.security.user.password=${USER_PASSWORD:User@SBI123}

# --- Actuator (RESTRICTED — DevSecOps A05) ---
# Only health and info exposed — never env, heapdump, beans, etc.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- OpenAPI / Swagger ---
# ZAP uses /v3/api-docs to discover all endpoints automatically (DAST Lab 2)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.root=WARN
logging.level.com.sbi.ems=INFO
logging.level.org.springframework.security=WARN

# --- Security ---
spring.mvc.hiddenmethod.filter.enabled=false
